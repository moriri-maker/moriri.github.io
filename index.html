<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>架空ニュースメーカー</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #312e81, #7c2d12);
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #f9fafb;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    header {
      background: #111827;
      color: white;
      padding: 28px 32px;
      text-align: center;
      border-bottom: 6px solid #dc2626;
    }

    header h1 {
      font-size: 34px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    header p {
      color: #d1d5db;
      font-size: 15px;
    }

    main {
      padding: 28px 32px 34px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .generate {
      background: #dc2626;
      color: white;
    }

    .generate:hover {
      background: #b91c1c;
      transform: translateY(-1px);
    }

    .copy, .clear {
      background: #e5e7eb;
      color: #111827;
    }

    .copy:hover, .clear:hover {
      background: #d1d5db;
      transform: translateY(-1px);
    }

    .news-card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }

    .tag {
      display: inline-block;
      background: #dc2626;
      color: white;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .headline {
      font-size: 30px;
      line-height: 1.35;
      margin-bottom: 18px;
      color: #111827;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 16px;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .body-text {
      font-size: 18px;
      line-height: 1.9;
      margin-bottom: 18px;
      white-space: pre-wrap;
    }

    .quote-box {
      background: #f3f4f6;
      border-left: 5px solid #dc2626;
      padding: 16px 18px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 16px;
      line-height: 1.8;
    }

    .message {
      text-align: center;
      color: #dc2626;
      font-weight: bold;
      min-height: 24px;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      margin-top: 22px;
    }

    @media (max-width: 640px) {
      header h1 {
        font-size: 26px;
      }

      main {
        padding: 22px;
      }

      .news-card {
        padding: 22px;
      }

      .headline {
        font-size: 24px;
      }

      .body-text {
        font-size: 16px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>架空ニュースメーカー</h1>
      <p>ありそうで絶対なさそうなニュースをランダム生成します。</p>
    </header>

    <main>
      <div class="buttons">
        <button class="generate" onclick="generateNews()">ニュースを生成</button>
        <button class="copy" onclick="copyNews()">コピー</button>
        <button class="copy" onclick="copyForX()">X用コピー</button>
        <button class="clear" onclick="clearNews()">消去</button>
      </div>

      <div id="message" class="message"></div>

      <article class="news-card" id="newsCard">
        <div class="tag" id="tag">速報</div>
        <h2 class="headline" id="headline">冷蔵庫、大学の食堂で人生相談を開始</h2>
        <p class="meta" id="meta">架空通信社・本日配信</p>
        <p class="body-text" id="bodyText">本日午前、大学の食堂で冷蔵庫が突然「保存するだけの人生は嫌だ」と発言したことが分かりました。現場は一時騒然となりましたが、現在は通常通り冷えています。</p>
        <div class="quote-box" id="witnessComment">目撃者は「最初は霜取り機能かと思った」と話しています。</div>
        <div class="quote-box" id="expertComment">専門家は「これは新しい時代の始まりです」と分析しています。</div>
      </article>

      <footer>© 2026 Fictional News Generator</footer>
    </main>
  </div>

  <script>
    const tags = ["速報", "悲報", "朗報", "独自", "緊急", "続報", "謎", "話題", "衝撃", "検証"];

    const subjects = [
      "冷蔵庫", "コピー機", "自動販売機", "信号機", "消しゴム", "シャーペン", "黒板", "椅子", "机", "時計",
      "カラス", "猫", "犬", "鳩", "金魚", "たぬき", "校長先生の銅像", "大学のプリンター", "駅の改札", "コンビニのおにぎり",
      "スマホ", "充電器", "リモコン", "電子レンジ", "扇風機", "洗濯機", "エアコン", "イヤホン", "ノート", "カバン"
    ];

    const places = [
      "大学の食堂", "コンビニ前", "駅のホーム", "教室のすみ", "図書館", "自転車置き場", "商店街", "公園のベンチ", "研究室", "スーパーのレジ前",
      "バス停", "屋上", "体育館裏", "カラオケ店", "パン屋の前", "交差点", "エレベーター内", "廊下", "自習室", "ラーメン屋"
    ];

    const actions = [
      "人生相談を開始", "突然の記者会見を実施", "深夜に哲学を語る", "人間関係に疲れたと発表", "謎のダンスを披露",
      "Wi-Fiのパスワードを解読", "将来の夢を語る", "静かに反省文を書く", "新しい部活動を設立", "月曜日への不満を表明",
      "自分探しの旅に出発", "まさかの立候補を表明", "昼休みに革命を宣言", "急に敬語を使い始める", "冷静に世界平和を提案"
    ];

    const speeches = [
      "もう限界です", "思っていた未来と違いました", "私はただ静かに暮らしたかった", "今日から本気を出します", "誰にも気づかれない努力をしてきました",
      "保存するだけの人生は嫌だ", "そろそろ評価されてもいい頃です", "月曜日だけは許せません", "自分の可能性を信じたい", "昨日の自分を超えたい"
    ];

    const situations = [
      "現場は一時騒然となりました", "周囲の学生たちは困惑した様子でした", "近くにいた人々は静かに拍手を送りました", "関係者は確認を急いでいます", "SNSでは驚きの声が広がっています",
      "一部では応援する声も上がっています", "店員は冷静に対応しました", "教授陣の間でも議論が広がっています", "通行人は二度見していました", "その後、何事もなかったように通常運転に戻りました"
    ];

    const witnesses = [
      "近くにいた学生", "通行人", "アルバイト店員", "自転車で通りかかった人", "偶然そこにいた犬", "近所のおじさん", "研究室の先輩", "清掃員", "ラーメン屋の店主", "目撃した高校生"
    ];

    const witnessReactions = [
      "最初は見間違いかと思った", "あまりにも自然で逆に怖かった", "正直、少し感動した", "何が起きているのか分からなかった", "とりあえず写真を撮った",
      "月曜日なら仕方ないと思った", "急に話しかけられてびっくりした", "意外と礼儀正しかった", "声が思ったより低かった", "また見たいと思った"
    ];

    const experts = [
      "専門家", "大学教授", "AI研究者", "心理カウンセラー", "元コンビニ店員", "都市伝説研究家", "生活家電評論家", "哲学者", "謎現象アナリスト", "自称未来人"
    ];

    const expertReactions = [
      "これは非常に珍しい現象です", "科学ではまだ説明できません", "新しい時代の始まりかもしれません", "思ったより深刻です", "社会全体で考えるべき問題です",
      "疲れている現代人へのメッセージでしょう", "まずは温かく見守る必要があります", "今後の研究が必要です", "正直、よく分かりません", "名前をつけるなら『日常型ミラクル現象』です"
    ];

    const endings = [
      "と話しています。", "と分析しています。", "と困惑した様子でした。", "と笑顔で語りました。", "と慎重な見方を示しました。"
    ];

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function generateNews() {
      const tag = randomItem(tags);
      const subject = randomItem(subjects);
      const place = randomItem(places);
      const action = randomItem(actions);
      const speech = randomItem(speeches);
      const situation = randomItem(situations);
      const witness = randomItem(witnesses);
      const witnessReaction = randomItem(witnessReactions);
      const expert = randomItem(experts);
      const expertReaction = randomItem(expertReactions);
      const ending = randomItem(endings);

      document.getElementById("tag").textContent = tag;
      document.getElementById("headline").textContent = `${subject}、${place}で${action}`;
      document.getElementById("meta").textContent = `架空通信社・本日${Math.floor(Math.random() * 24)}時${Math.floor(Math.random() * 60)}分配信`;
      document.getElementById("bodyText").textContent = `本日、${place}で${subject}が突然「${speech}」と発言したことが分かりました。${situation}。関係者によると、${subject}は以前から何かを考え込むような様子を見せていたということです。`;
      document.getElementById("witnessComment").textContent = `${witness}は「${witnessReaction}」と話しています。`;
      document.getElementById("expertComment").textContent = `${expert}は「${expertReaction}」${ending}`;
      document.getElementById("message").textContent = "";
    }

    function getNewsText() {
      const tag = document.getElementById("tag").textContent;
      const headline = document.getElementById("headline").textContent;
      const meta = document.getElementById("meta").textContent;
      const body = document.getElementById("bodyText").textContent;
      const witness = document.getElementById("witnessComment").textContent;
      const expert = document.getElementById("expertComment").textContent;

      return `【${tag}】${headline}\n${meta}\n\n${body}\n\n${witness}\n${expert}`;
    }

    function copyNews() {
      navigator.clipboard.writeText(getNewsText());
      document.getElementById("message").textContent = "コピーしました。";
    }

    function copyForX() {
      const tag = document.getElementById("tag").textContent;
      const headline = document.getElementById("headline").textContent;
      const url = "https://moriri-maker.github.io/moriri.github.io/";
      const text = `【${tag}】${headline}
#架空ニュースメーカー
${url}`;

      navigator.clipboard.writeText(text);
      document.getElementById("message").textContent = "X投稿用テキストをコピーしました。";
    }

    function clearNews() {
      document.getElementById("tag").textContent = "---";
      document.getElementById("headline").textContent = "ニュースを生成してください";
      document.getElementById("meta").textContent = "";
      document.getElementById("bodyText").textContent = "";
      document.getElementById("witnessComment").textContent = "";
      document.getElementById("expertComment").textContent = "";
      document.getElementById("message").textContent = "";
    }

    generateNews();
  </script>
</body>
</html>
